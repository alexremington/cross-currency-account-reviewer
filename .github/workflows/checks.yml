name: Cross-Currency Reviewer checks

on:
  push:
  pull_request:

jobs:
  checks:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm test
      - run: npm run check
      - run: npm run check:windows
      - run: npm run sanity:results
      - run: npm run smoke:ui:local
